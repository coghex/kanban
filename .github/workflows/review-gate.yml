name: Review gate

on:
  pull_request:
    types: [opened, reopened, synchronize, labeled, unlabeled]

permissions:
  contents: read

jobs:
  review-approved:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require a current reviewed:approve label
        env:
          ACTION: ${{ github.event.action }}
          LABEL: ${{ github.event.label.name }}
        run: |
          if [ "$ACTION" = "labeled" ] && [ "$LABEL" = "reviewed:approve" ]; then
            echo "reviewed:approve added for the current pull-request head"
          else
            echo "a current reviewed:approve verdict is required"
            exit 1
          fi

  dismiss-stale-approval:
    if: github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'reviewed:approve')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Remove approval after the pull-request head changes
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-label reviewed:approve
